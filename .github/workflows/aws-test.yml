name: AWS OIDC Test

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_ARTIFACT_BUCKET: ${{ vars.S3_ARTIFACT_BUCKET }}

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Install Dependencies
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Build Artifact
        run: |
          zip -r artifact.zip . \
            -x ".git/*" \
            -x "node_modules/*"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Verify AWS Access
        run: |
          aws sts get-caller-identity
      - name: Test S3
        run: |
            aws s3 cp artifact.zip \
                s3://${S3_ARTIFACT_BUCKET}/releases/${GITHUB_SHA}.zip
            aws s3 cp artifact.zip \
                s3://${S3_ARTIFACT_BUCKET}/latest/current.zip
      - name: Deploy
        run: |
          aws deploy create-deployment \
            --application-name AutoDeployment \
            --deployment-group-name AutoDeploymentLaravel \
            --s3-location bucket=${S3_ARTIFACT_BUCKET},key=latest/current.zip,bundleType=zip